name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1
        with:
          xcode-version: latest-stable

      - name: Derive version from tag
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Setup Sparkle
        run: |
          curl -fL -o Sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          mkdir -p bin/Sparkle
          tar -xf Sparkle.tar.xz -C bin/Sparkle
          rm Sparkle.tar.xz

      - name: Build and Package
        run: |
          mkdir -p .build/release
          cp -R bin/Sparkle/Sparkle.framework .build/release/

          ./build.sh

          codesign -s - -f --deep NetworkMap.app

      - name: Create Archive
        run: zip -ry "NetworkMap-${VERSION}.zip" NetworkMap.app

      - name: Upload Release Archive
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: "NetworkMap-*.zip"
          generate_release_notes: true
