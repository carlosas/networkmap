name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1
        with:
          xcode-version: latest-stable

      - name: Derive version from tag
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Setup Sparkle
        run: |
          curl -fL -o Sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          mkdir -p bin/Sparkle
          tar -xf Sparkle.tar.xz -C bin/Sparkle
          rm Sparkle.tar.xz

      - name: Build and Package
        run: |
          mkdir -p .build/release
          cp -R bin/Sparkle/Sparkle.framework .build/release/

          ./build.sh

          codesign -s - -f --deep NetworkMap.app

      - name: Remove quarantine attributes
        run: xattr -cr NetworkMap.app

      - name: Create DMG
        run: ./create-dmg.sh

      - name: Upload Release DMG
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: "NetworkMap-*.dmg"
          generate_release_notes: true

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        if: env.TAP_TOKEN != ''
        run: |
          SHA=$(shasum -a 256 "NetworkMap-${VERSION}.dmg" | awk '{print $1}')

          cat > networkmap.rb <<CASK
          cask "networkmap" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/carlosas/networkmap/releases/download/v#{version}/NetworkMap-#{version}.dmg"
            name "NetworkMap"
            desc "macOS menu bar app that displays network information in real-time"
            homepage "https://github.com/carlosas/networkmap"

            app "NetworkMap.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/NetworkMap.app"]
            end
          end
          CASK

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' networkmap.rb

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/carlosas/homebrew-networkmap.git" tap
          cp networkmap.rb tap/Casks/networkmap.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/networkmap.rb
          git commit -m "Update NetworkMap to ${VERSION}"
          git push
