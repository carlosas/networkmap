name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1
        with:
          xcode-version: latest-stable

      - name: Derive version and build number from tag
        run: |
          RAW_TAG="${{ github.ref_name }}"
          echo "VERSION=${RAW_TAG#v}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Setup Sparkle
        run: |
          curl -fL -o Sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          mkdir -p bin/Sparkle
          tar -xf Sparkle.tar.xz -C bin/Sparkle
          rm Sparkle.tar.xz

      - name: Generate Icons from SVG
        run: |
          if [ -f "icon.svg" ]; then
            echo "Found icon.svg, generating app and menu bar icons..."
            swift generate_icons.swift
          else
            echo "No icon.svg found, skipping icon generation."
          fi

      - name: Cache nmap build
        uses: actions/cache@v4
        with:
          path: .build/nmap-build
          key: nmap-7.95-${{ runner.arch }}

      - name: Build and Package
        run: |
          mkdir -p .build/release
          cp -R bin/Sparkle/Sparkle.framework .build/release/

          ./build.sh

          codesign -s - -f --deep NetworkMap.app

      - name: Remove quarantine attributes
        run: xattr -cr NetworkMap.app

      - name: Create DMG
        run: ./create-dmg.sh

      - name: Upload Release DMG
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: "NetworkMap-*.dmg"
          generate_release_notes: true

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_FILE="NetworkMap-${VERSION}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_FILE")
          DMG_URL="https://github.com/carlosas/networkmap/releases/download/v${VERSION}/${DMG_FILE}"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          ENCLOSURE_ATTRS="length=\"${DMG_SIZE}\""
          if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            KEYFILE=$(mktemp)
            echo "$SPARKLE_PRIVATE_KEY" > "$KEYFILE"
            SIGN_OUTPUT=$(bin/Sparkle/bin/sign_update "$DMG_FILE" -f "$KEYFILE")
            rm -f "$KEYFILE"
            ENCLOSURE_ATTRS="$SIGN_OUTPUT"
          else
            echo "::warning::SPARKLE_PRIVATE_KEY not set. Appcast generated without EdDSA signature."
          fi

          mkdir -p _site
          cat > _site/appcast.xml <<APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>NetworkMap</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}"
                           ${ENCLOSURE_ATTRS}
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST

      - name: Deploy appcast to GitHub Pages
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for v${VERSION}"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:gh-pages

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        if: env.TAP_TOKEN != ''
        run: |
          SHA=$(shasum -a 256 "NetworkMap-${VERSION}.dmg" | awk '{print $1}')

          cat > networkmap.rb <<CASK
          cask "networkmap" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/carlosas/networkmap/releases/download/v#{version}/NetworkMap-#{version}.dmg"
            name "NetworkMap"
            desc "macOS menu bar app that displays network information in real-time"
            homepage "https://github.com/carlosas/networkmap"

            app "NetworkMap.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/NetworkMap.app"]
            end
          end
          CASK

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' networkmap.rb

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/carlosas/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cp networkmap.rb tap/Casks/networkmap.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/networkmap.rb
          git commit -m "Update NetworkMap to ${VERSION}"
          git push
